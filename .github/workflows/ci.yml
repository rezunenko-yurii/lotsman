name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (with optional embeddings)
        run: pip install -e ".[embeddings]"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: "Smoke: self-index"
        run: |
          lotsman index
          lotsman map --budget 400
          lotsman search "pagerank power iteration" -k 3
          lotsman doctor --json

  package:
    # The editable install above exercises repo-checkout paths; this job
    # proves the wheel itself installs and runs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Install wheel and smoke-test
        run: |
          pip install dist/*.whl
          cd /tmp
          lotsman --version
          mkdir smoke && cd smoke && echo "def probe(): pass" > probe.py
          lotsman index --no-embed
          lotsman doctor --json
          lotsman outline probe.py
